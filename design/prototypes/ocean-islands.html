<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept A — Ocean Islands</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
        canvas { display: block; }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        #header { position: absolute; top: 32px; left: 32px; pointer-events: auto; }
        #header h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.9); }
        #header p { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 0.1em; }

        #search { position: absolute; top: 32px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        #search input {
            width: 380px; padding: 12px 20px; border-radius: 24px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: white; font-size: 13px; outline: none;
            backdrop-filter: blur(20px);
        }
        #search input::placeholder { color: rgba(255,255,255,0.3); }
        #search input:focus { border-color: rgba(100,180,255,0.4); background: rgba(255,255,255,0.12); }

        #legend { position: absolute; bottom: 32px; left: 32px; pointer-events: auto; }
        #legend span { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; }

        #tooltip {
            position: absolute; display: none; padding: 12px 16px; border-radius: 12px;
            background: rgba(10,22,40,0.9); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); pointer-events: none; max-width: 240px;
        }
        #tooltip .topic { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
        #tooltip .count { font-size: 11px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="header">
            <h1>The Observatory</h1>
            <p>Concept A — Ocean Islands</p>
        </div>
        <div id="search">
            <input type="text" placeholder="Explore a research field..." value="Machine Learning" readonly>
        </div>
        <div id="legend">
            <span>MACHINE LEARNING — 10,247 PAPERS — 8 RESEARCH ISLANDS</span>
        </div>
        <div id="tooltip">
            <div class="topic" id="tt-topic"></div>
            <div class="count" id="tt-count"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Research clusters as islands
        const clusters = [
            { name: 'Transformers & Attention', papers: 2840, x: 0.35, y: 0.38, r: 0.14, color: '#4A9EFF', sub: ['Self-Attention', 'Multi-Head', 'Efficient Transformers', 'Vision Transformers'] },
            { name: 'Reinforcement Learning', papers: 1920, x: 0.68, y: 0.35, r: 0.11, color: '#FF6B8A', sub: ['Multi-Agent RL', 'Offline RL', 'Policy Gradient', 'Model-Based RL'] },
            { name: 'Generative Models', papers: 1650, x: 0.25, y: 0.62, r: 0.10, color: '#8B5CF6', sub: ['Diffusion', 'GANs', 'VAEs', 'Flow Models'] },
            { name: 'LLM Safety & Alignment', papers: 1100, x: 0.55, y: 0.58, r: 0.09, color: '#F59E0B', sub: ['RLHF', 'Red-Teaming', 'Constitutional AI', 'Jailbreaking'] },
            { name: 'Graph Neural Networks', papers: 890, x: 0.78, y: 0.60, r: 0.07, color: '#10B981', sub: ['Message Passing', 'Spectral Methods', 'Link Prediction'] },
            { name: 'Federated Learning', papers: 620, x: 0.15, y: 0.35, r: 0.06, color: '#06B6D4', sub: ['Privacy', 'Aggregation', 'Heterogeneity'] },
            { name: 'Neural Architecture Search', papers: 480, x: 0.85, y: 0.42, r: 0.05, color: '#EC4899', sub: ['One-Shot NAS', 'Pruning', 'Distillation'] },
            { name: 'Causal Inference', papers: 350, x: 0.48, y: 0.78, r: 0.045, color: '#84CC16', sub: ['Do-Calculus', 'Counterfactuals', 'Treatment Effects'] },
        ];

        // Generate points per cluster
        const allPoints = [];
        clusters.forEach(cl => {
            const cx = cl.x * W;
            const cy = cl.y * H;
            const baseR = cl.r * Math.min(W, H);

            for (let i = 0; i < cl.papers / 4; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.pow(Math.random(), 0.6) * baseR;
                allPoints.push({
                    x: cx + Math.cos(angle) * dist,
                    y: cy + Math.sin(angle) * dist,
                    cluster: cl,
                    size: 1 + Math.random() * 2
                });
            }
        });

        // Water effect - subtle grid dots
        const waterDots = [];
        for (let i = 0; i < 800; i++) {
            waterDots.push({ x: Math.random() * W, y: Math.random() * H });
        }

        let hoveredCluster = null;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        function drawIslandContour(cl, highlight) {
            const cx = cl.x * W;
            const cy = cl.y * H;
            const baseR = cl.r * Math.min(W, H);

            // Organic island shape using multiple circles
            ctx.beginPath();
            const points = 64;
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const noise = Math.sin(angle * 3 + time * 0.5) * 0.08 +
                              Math.sin(angle * 5 + time * 0.3) * 0.05 +
                              Math.sin(angle * 7) * 0.03;
                const r = baseR * (1.1 + noise);
                const px = cx + Math.cos(angle) * r;
                const py = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();

            // Island fill - subtle gradient
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 1.2);
            const alpha = highlight ? 0.25 : 0.12;
            grad.addColorStop(0, cl.color + (highlight ? '40' : '20'));
            grad.addColorStop(0.7, cl.color + (highlight ? '18' : '0a'));
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fill();

            // Island border
            ctx.strokeStyle = cl.color + (highlight ? '60' : '25');
            ctx.lineWidth = highlight ? 1.5 : 0.5;
            ctx.stroke();
        }

        function drawLabel(cl, highlight) {
            const cx = cl.x * W;
            const cy = cl.y * H;

            ctx.textAlign = 'center';

            // Cluster name
            ctx.font = highlight ? 'bold 13px Inter, sans-serif' : '500 11px Inter, sans-serif';
            ctx.fillStyle = highlight ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.55)';
            ctx.fillText(cl.name, cx, cy - 8);

            // Paper count
            ctx.font = '10px Inter, sans-serif';
            ctx.fillStyle = highlight ? cl.color : 'rgba(255,255,255,0.25)';
            ctx.fillText(`${cl.papers.toLocaleString()} papers`, cx, cy + 8);

            // Sub-topics on hover
            if (highlight) {
                cl.sub.forEach((s, i) => {
                    ctx.font = '9px Inter, sans-serif';
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.fillText(s, cx, cy + 26 + i * 14);
                });
            }
        }

        function draw() {
            time += 0.01;
            ctx.clearRect(0, 0, W, H);

            // Background gradient - deep ocean
            const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.7);
            bgGrad.addColorStop(0, '#0d1f3c');
            bgGrad.addColorStop(1, '#060e1a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Water dots (subtle)
            waterDots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, 0.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100,160,255,0.06)';
                ctx.fill();
            });

            // Check hover
            hoveredCluster = null;
            clusters.forEach(cl => {
                const cx = cl.x * W;
                const cy = cl.y * H;
                const dist = Math.sqrt((mouseX - cx) ** 2 + (mouseY - cy) ** 2);
                if (dist < cl.r * Math.min(W, H) * 1.2) {
                    hoveredCluster = cl;
                }
            });

            // Draw connections between nearby clusters (subtle)
            for (let i = 0; i < clusters.length; i++) {
                for (let j = i + 1; j < clusters.length; j++) {
                    const a = clusters[i], b = clusters[j];
                    const dist = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
                    if (dist < 0.35) {
                        ctx.beginPath();
                        ctx.moveTo(a.x * W, a.y * H);
                        ctx.lineTo(b.x * W, b.y * H);
                        ctx.strokeStyle = 'rgba(100,160,255,0.04)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            // Draw islands
            clusters.forEach(cl => {
                const highlight = hoveredCluster === cl;
                drawIslandContour(cl, highlight);
            });

            // Draw points
            allPoints.forEach(p => {
                // Recalculate position on resize
                const cx = p.cluster.x * W;
                const cy = p.cluster.y * H;
                const baseR = p.cluster.r * Math.min(W, H);

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (hoveredCluster === p.cluster ? 1.3 : 1), 0, Math.PI * 2);
                const alpha = hoveredCluster === p.cluster ? 0.7 : 0.3;
                ctx.fillStyle = p.cluster.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.fill();
            });

            // Draw labels
            clusters.forEach(cl => {
                drawLabel(cl, hoveredCluster === cl);
            });

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        draw();
    </script>
</body>
</html>
